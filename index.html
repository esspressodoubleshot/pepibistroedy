<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);color:var(--color-text-primary);padding-bottom:2rem}

.hdr{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.875rem 1.125rem;margin-bottom:.875rem;display:flex;align-items:center;justify-content:space-between}

.avatar{width:36px;height:36px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#0F6E56;flex-shrink:0}
.hdr-title{font-size:14px;font-weight:500}
.hdr-sub{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.notion-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#185FA5;text-decoration:none;border:0.5px solid #B5D4F4;border-radius:4px;padding:3px 8px;background:#E6F1FB}

.session-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.875rem}
.sf label{display:block;font-size:10px;font-weight:500;color:var(--color-text-secondary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.sf select{width:100%;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:5px 7px;background:var(--color-background-primary);color:var(--color-text-primary)}

.prog-card{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:.625rem .875rem;margin-bottom:.875rem}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-track{height:5px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width .25s}
.stat-row{display:flex;gap:10px;margin-top:5px}
.stat-pill{font-size:10px;color:var(--color-text-secondary);display:flex;align-items:center;gap:3px}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block}

.section{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:.625rem;overflow:hidden}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:.5rem .875rem;background:var(--color-background-secondary);cursor:pointer;user-select:none}
.sec-title{font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.sec-meta{display:flex;align-items:center;gap:6px}
.sec-badge{font-size:10px;color:var(--color-text-tertiary)}
.sec-avg{font-size:10px;padding:1px 6px;border-radius:3px;background:#E1F5EE;color:#0F6E56}
.sec-chev{font-size:13px;color:var(--color-text-secondary);transition:transform .2s}
.sec-chev.open{transform:rotate(180deg)}
.sec-body{display:none;background:var(--color-background-primary)}
.sec-body.open{display:block}

.item{border-top:0.5px solid var(--color-border-tertiary)}
.item:first-child{border-top:none}
.item-main{display:grid;grid-template-columns:minmax(0,1fr) 104px 56px;gap:6px;align-items:center;padding:.5rem .875rem}
.item-name{font-size:12px;line-height:1.4}
.item-freq{font-size:9px;font-weight:500;padding:1px 5px;border-radius:3px;display:inline-block;margin-top:2px}
.fd{background:#E1F5EE;color:#0F6E56}
.fw{background:#E6F1FB;color:#185FA5}
.fm{background:#FAEEDA;color:#854F0B}
.st-sel{font-size:11px;width:100%;padding:3px 4px;border:0.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary)}
.sc-inp{width:100%;font-size:12px;padding:3px 5px;border:0.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary);text-align:center}
.sc-inp:focus{border-color:#1D9E75;outline:none;box-shadow:0 0 0 2px #E1F5EE}
.item-notes{padding:0 .875rem .5rem;display:none}
.item-notes textarea{width:100%;font-size:11px;padding:4px 6px;border:0.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-secondary);color:var(--color-text-primary);resize:none;height:38px;font-family:inherit;line-height:1.4}
.item-notes textarea::placeholder{color:var(--color-text-tertiary)}
.item-saved{display:none;font-size:10px;color:#1D9E75;padding:0 .875rem .375rem;align-items:center;gap:4px}
.item-saved.show{display:flex}

.action-bar{display:flex;flex-direction:column;gap:8px;margin-top:1rem}
.btn-primary{width:100%;padding:.625rem;font-size:13px;font-weight:500;border:none;border-radius:var(--border-radius-md);background:#1D9E75;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{width:100%;padding:.5rem;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}

.status-area{border-radius:var(--border-radius-md);padding:.625rem .875rem;margin-top:.875rem;font-size:12px;display:none;align-items:center;gap:8px}
.status-area.sending{display:flex;background:#E6F1FB;color:#185FA5}
.status-area.success{display:flex;background:#E1F5EE;color:#0F6E56}
.status-area.error{display:flex;background:#FCEBEB;color:#A32D2D}

.spinner{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.result-summary{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.875rem 1.125rem;margin-top:.875rem;display:none}
.result-summary.show{display:block}
.result-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:.625rem 0}
.result-metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.5rem;text-align:center}
.result-num{font-size:20px;font-weight:500}
.result-lbl{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
</style>

<script>
const CATS = [
  {id:'product',label:'🥦 Product',items:[
    {no:1,name:'Ketersediaan semua menu (availability 100%)',freq:'Daily'},
    {no:2,name:'Kesesuaian bahan baku dengan standar menu',freq:'Daily'},
    {no:3,name:'Plating / presentasi sesuai foto standar',freq:'Daily'},
    {no:4,name:'Menu seasonal / promo tersedia & di-highlight',freq:'Daily'},
    {no:5,name:'Kondisi bahan baku fresh (cek FIFO)',freq:'Weekly'},
    {no:6,name:'Pengecekan tanggal kadaluarsa bahan baku',freq:'Daily'}
  ]},
  {id:'taste',label:'👅 Taste',items:[
    {no:7,name:'Tasting test menu utama (Quality Control)',freq:'Daily'},
    {no:8,name:'Konsistensi rasa sesuai master recipe',freq:'Daily'},
    {no:9,name:'Cek seasoning & balancing rasa setiap menu',freq:'Daily'},
    {no:10,name:'Tasting test menu baru / special',freq:'Weekly'},
    {no:11,name:'Feedback rasa dari customer (cek review)',freq:'Weekly'},
    {no:12,name:'Evaluasi menu dengan rating < 4.0',freq:'Weekly'}
  ]},
  {id:'quality',label:'✅ Quality',items:[
    {no:13,name:'Tekstur & warna masakan sesuai standar',freq:'Daily'},
    {no:14,name:'Cek alat masak & peralatan dapur berfungsi',freq:'Daily'},
    {no:15,name:'Food waste monitoring & pencatatan',freq:'Daily'},
    {no:16,name:'Pengecekan hasil masakan sebelum disajikan',freq:'Daily'},
    {no:17,name:'Audit kualitas mingguan per kategori menu',freq:'Weekly'}
  ]},
  {id:'customer',label:'🤝 Customer Service',items:[
    {no:18,name:'Respon komplain customer (< 10 menit)',freq:'Daily'},
    {no:19,name:'Cek waktu penyajian (target: ≤ 15 menit)',freq:'Daily'},
    {no:20,name:'Follow-up customer satisfaction (dine-in)',freq:'Daily'},
    {no:21,name:'Action plan komplain berulang',freq:'Weekly'}
  ]},
  {id:'recipe',label:'📖 Recipe',items:[
    {no:22,name:'Recipe card tersedia di semua station',freq:'Weekly'},
    {no:23,name:'Kesesuaian pelaksanaan vs master recipe',freq:'Daily'},
    {no:24,name:'Update recipe jika ada perubahan supplier/bahan',freq:'Monthly'},
    {no:25,name:'Dokumentasi recipe baru / modifikasi',freq:'Monthly'},
    {no:26,name:'Briefing resep ke seluruh staff kitchen',freq:'Weekly'}
  ]},
  {id:'staff',label:'👨‍🍳 Staff',items:[
    {no:27,name:'Absensi & ketepatan waktu staff kitchen',freq:'Daily'},
    {no:28,name:'Briefing pre-shift (15 menit sebelum buka)',freq:'Daily'},
    {no:29,name:'Evaluasi performa staff per individu',freq:'Weekly'},
    {no:30,name:'Training skill kitchen (knife skill, cooking technique)',freq:'Weekly'},
    {no:31,name:'Rotasi & penugasan station',freq:'Weekly'},
    {no:32,name:'Cek attitude & disiplin kerja',freq:'Daily'}
  ]},
  {id:'clean',label:'🧹 Cleanliness',items:[
    {no:33,name:'Kebersihan area dapur (floor, countertop, station)',freq:'Daily'},
    {no:34,name:'Sanitasi peralatan masak & cutting board',freq:'Daily'},
    {no:35,name:'Kebersihan area penyimpanan bahan baku',freq:'Daily'},
    {no:36,name:'Pest control & kebersihan drain',freq:'Weekly'},
    {no:37,name:'Kebersihan exhaust fan & hood',freq:'Weekly'},
    {no:38,name:'Personal hygiene staff (uniform, hair net, dll)',freq:'Daily'},
    {no:39,name:'Cek kebersihan chiller & freezer',freq:'Daily'},
    {no:40,name:'Deep cleaning jadwal bulanan',freq:'Monthly'}
  ]},
  {id:'improve',label:'📈 Improve',items:[
    {no:41,name:'COGS monitoring vs target (food cost %)',freq:'Weekly'},
    {no:42,name:'Reorder point bahan baku & stok minimum',freq:'Daily'},
    {no:43,name:'Inovasi menu / upselling item baru',freq:'Monthly'},
    {no:44,name:'Efisiensi waktu prep & mise en place',freq:'Daily'},
    {no:45,name:'Pemanfaatan sisa bahan (zero waste initiative)',freq:'Weekly'},
    {no:46,name:'Dokumentasi foto standar menu (update berkala)',freq:'Monthly'},
    {no:47,name:'Monitoring promo effectivity di kitchen side',freq:'Weekly'}
  ]}
];

const state={};
CATS.forEach(c=>c.items.forEach(i=>{state[i.no]={status:'❌ Pending',score:'',notes:'',saved:false}}));
const openSec=new Set(CATS.map(c=>c.id));

function freqClass(f){return f==='Daily'?'fd':f==='Weekly'?'fw':'fm';}

function buildUI(){
  const root=document.getElementById('checklist-root');
  root.innerHTML='';
  CATS.forEach(cat=>{
    const sec=document.createElement('div');
    sec.className='section';
    sec.id='sec-'+cat.id;
    const body_id='body-'+cat.id;
    sec.innerHTML=`<div class="sec-hdr" onclick="toggleSec('${cat.id}')">
      <span class="sec-title">${cat.label}</span>
      <span class="sec-meta">
        <span class="sec-badge" id="cnt-${cat.id}">${cat.items.length} items</span>
        <span class="sec-avg" id="avg-${cat.id}" style="display:none"></span>
        <i class="ti ti-chevron-down sec-chev open" id="chev-${cat.id}" aria-hidden="true"></i>
      </span>
    </div>
    <div class="sec-body open" id="${body_id}">
      ${cat.items.map(item=>`
      <div class="item" id="item-${item.no}">
        <div class="item-main">
          <div>
            <div class="item-name">${item.no}. ${item.name}</div>
            <span class="item-freq ${freqClass(item.freq)}">${item.freq}</span>
          </div>
          <select class="st-sel" id="st-${item.no}" onchange="onStatus(${item.no},this.value)">
            <option value="❌ Pending">❌ Pending</option>
            <option value="✅ Done">✅ Done</option>
            <option value="🔄 In Progress">🔄 In Progress</option>
            <option value="⏭️ Skip">⏭️ Skip</option>
          </select>
          <input class="sc-inp" id="sc-${item.no}" type="number" min="1" max="5" step="1" placeholder="—" oninput="onScore(${item.no},this.value)">
        </div>
        <div class="item-notes" id="notes-${item.no}">
          <textarea placeholder="Notes / action plan..." oninput="onNotes(${item.no},this.value)"></textarea>
        </div>
        <div class="item-saved" id="saved-${item.no}">
          <i class="ti ti-circle-check" style="font-size:12px" aria-hidden="true"></i>
          Tersimpan di Notion
        </div>
      </div>`).join('')}
    </div>`;
    root.appendChild(sec);
  });
}

function toggleSec(id){
  const open=openSec.has(id);
  if(open) openSec.delete(id); else openSec.add(id);
  document.getElementById('body-'+id).classList.toggle('open',!open);
  document.getElementById('chev-'+id).classList.toggle('open',!open);
}

function onStatus(no,val){
  state[no].status=val;
  state[no].saved=false;
  const nd=document.getElementById('notes-'+no);
  if(val!=='❌ Pending' && val!=='⏭️ Skip') nd.style.display='block';
  else nd.style.display='none';
  refreshProgress();
  refreshCatAvg(getCat(no));
}

function onScore(no,val){
  const v=parseInt(val);
  if(val===''||isNaN(v)){state[no].score=''}
  else{state[no].score=Math.min(5,Math.max(1,v));}
  state[no].saved=false;
  refreshProgress();
  refreshCatAvg(getCat(no));
}

function onNotes(no,val){state[no].notes=val;state[no].saved=false;}

function getCat(no){
  for(const c of CATS){if(c.items.find(i=>i.no===no))return c.id;}
  return null;
}

function refreshCatAvg(catId){
  const cat=CATS.find(c=>c.id===catId);
  if(!cat)return;
  const scores=cat.items.map(i=>state[i.no].score).filter(s=>s!=='');
  const el=document.getElementById('avg-'+catId);
  if(scores.length){
    const avg=(scores.reduce((a,b)=>a+parseFloat(b),0)/scores.length).toFixed(1);
    el.style.display='inline-block';
    el.textContent='avg '+avg;
  } else {
    el.style.display='none';
  }
}

function refreshProgress(){
  let done=0,ip=0,pend=0,skip=0;
  const allScores=[];
  Object.values(state).forEach(s=>{
    if(s.status==='✅ Done') done++;
    else if(s.status==='🔄 In Progress') ip++;
    else if(s.status==='⏭️ Skip') skip++;
    else pend++;
    if(s.score!=='') allScores.push(parseFloat(s.score));
  });
  const active=47-skip;
  const pct=active>0?Math.round((done/active)*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=done+' / '+active;
  document.getElementById('c-done').textContent=done;
  document.getElementById('c-ip').textContent=ip;
  document.getElementById('c-pend').textContent=pend;
  document.getElementById('c-skip').textContent=skip;
  const avg=allScores.length?(allScores.reduce((a,b)=>a+b,0)/allScores.length).toFixed(1):'—';
  document.getElementById('avg-score').textContent=avg;
}

function onSessionChange(){}

function setStatus(type,msg){
  const el=document.getElementById('status-area');
  el.className='status-area '+type;
  const ico=document.getElementById('status-icon');
  const msgEl=document.getElementById('status-msg');
  if(type==='sending'){ico.innerHTML='<span class="spinner"></span>';}
  else if(type==='success'){ico.innerHTML='<i class="ti ti-circle-check" style="font-size:16px" aria-hidden="true"></i>';}
  else{ico.innerHTML='<i class="ti ti-alert-circle" style="font-size:16px" aria-hidden="true"></i>';}
  msgEl.textContent=msg;
}

async function submitToNotion(){
  const outlet=document.getElementById('sel-outlet').value;
  const week=document.getElementById('sel-week').value;
  const day=document.getElementById('sel-day').value;
  if(!outlet||!week||!day){
    setStatus('error','Lengkapi Outlet, Week, dan Hari kunjungan dulu.');
    return;
  }
  const filled=Object.entries(state).filter(([,s])=>s.status!=='❌ Pending'||s.score!=='');
  if(!filled.length){
    setStatus('error','Isi minimal 1 item sebelum menyimpan ke Notion.');
    return;
  }
  document.getElementById('btn-submit').disabled=true;
  setStatus('sending',`Menyimpan ${filled.length} item ke Notion...`);

  const itemsPayload=filled.map(([no,s])=>{
    const cat=CATS.find(c=>c.items.find(i=>i.no===parseInt(no)));
    const item=cat.items.find(i=>i.no===parseInt(no));
    return {
      no:parseInt(no),
      name:item.name,
      kategori:cat.label,
      freq:item.freq,
      outlet,week,
      status:s.status,
      score:s.score||null,
      notes:s.notes||''
    };
  });

  const prompt=`Update Notion database checklist Edy Saputra.

Data Source ID: 54f518b0-9000-47ee-a3e8-1f9e87c2b425
Notion DB: https://app.notion.com/p/6f8a707848374829bfb9976343d55767

Untuk SETIAP item di bawah, cari page yang punya "No" = nomor item tersebut di database, lalu update properti:
- Outlet: nilai outlet
- Week: nilai week  
- Status: nilai status
- Score: nilai score (jika ada)
- Notes / Action Plan: nilai notes (jika ada)

Items yang perlu di-update (${itemsPayload.length} item):
${JSON.stringify(itemsPayload,null,2)}

Setelah semua update selesai, tampilkan konfirmasi ringkas: berapa item berhasil diupdate, dan AVG Score per Kategori.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const reply=data.content?.map(b=>b.text||'').join('');

    filled.forEach(([no])=>{
      state[no].saved=true;
      const el=document.getElementById('saved-'+no);
      if(el)el.classList.add('show');
    });

    setStatus('success',`${filled.length} item berhasil dikirim ke Notion.`);
    showResultCard(outlet,week,day,filled.length);
    document.getElementById('btn-submit').disabled=false;

  } catch(e){
    setStatus('error','Gagal terhubung. Pastikan koneksi internet aktif.');
    document.getElementById('btn-submit').disabled=false;
  }
}

function showResultCard(outlet,week,day,count){
  const card=document.getElementById('result-card');
  card.classList.add('show');
  document.getElementById('result-meta').textContent=
    outlet.replace('🏪 ','') +' · '+ week +' · '+ day +' — '+new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});

  const vals=Object.values(state);
  const done=vals.filter(s=>s.status==='✅ Done').length;
  const ip=vals.filter(s=>s.status==='🔄 In Progress').length;
  const skip=vals.filter(s=>s.status==='⏭️ Skip').length;
  const scores=vals.filter(s=>s.score!=='').map(s=>parseFloat(s.score));
  const avg=scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):'—';

  document.getElementById('result-grid').innerHTML=`
    <div class="result-metric"><div class="result-num" style="color:#1D9E75">${done}</div><div class="result-lbl">Done</div></div>
    <div class="result-metric"><div class="result-num" style="color:#378ADD">${ip}</div><div class="result-lbl">In Progress</div></div>
    <div class="result-metric"><div class="result-num" style="color:#888780">${skip}</div><div class="result-lbl">Skip</div></div>
    <div class="result-metric"><div class="result-num" style="color:#1D9E75">${avg}</div><div class="result-lbl">AVG Score</div></div>`;
}

function previewSummary(){
  const outlet=document.getElementById('sel-outlet').value;
  const week=document.getElementById('sel-week').value;
  const vals=Object.values(state);
  const done=vals.filter(s=>s.status==='✅ Done').length;
  const ip=vals.filter(s=>s.status==='🔄 In Progress').length;
  const pend=vals.filter(s=>s.status==='❌ Pending').length;
  const scores=vals.filter(s=>s.score!=='').map(s=>parseFloat(s.score));
  const avg=scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):'belum ada';

  const notesItems=Object.entries(state).filter(([,s])=>s.notes.trim());
  const notesList=notesItems.map(([no,s])=>{
    const cat=CATS.find(c=>c.items.find(i=>i.no===parseInt(no)));
    const item=cat.items.find(i=>i.no===parseInt(no));
    return `- No.${no} ${item.name}: ${s.notes}`;
  }).join('\n');

  sendPrompt(`Buatkan laporan ringkasan mingguan Sous Chef Edy Saputra format siap kirim ke Area Manager Missyully.

Data checklist:
- Outlet: ${outlet||'belum dipilih'}
- Week: ${week||'belum dipilih'}
- Total item: 47
- Done: ${done} | In Progress: ${ip} | Pending: ${pend}
- AVG Score: ${avg}
- Item dengan notes/temuan:
${notesList||'(belum ada notes)'}

Format: ringkas, profesional, dalam Bahasa Indonesia. Sertakan status per kategori jika bisa.`);
}

buildUI();
refreshProgress();
</script>
